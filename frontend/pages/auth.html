<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ShopWave</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
</head>
<body style="background:linear-gradient(135deg,var(--brand-light) 0%,#FFF0E8 50%,#E8F9F8 100%);min-height:100vh;display:flex;flex-direction:column;">

<nav class="navbar">
  <div class="container">
    <div class="navbar__inner">
      <a href="/" class="navbar__logo">
        <div class="navbar__logo-icon">🌊</div>
        <span class="navbar__logo-text">Shop<span>Wave</span></span>
      </a>
    </div>
  </div>
</nav>

<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:var(--space-8);">
  <div style="width:100%;max-width:460px;">

    <!-- Tab Toggle -->
    <div style="display:flex;background:var(--brand-white);border-radius:var(--radius-full);padding:4px;margin-bottom:var(--space-6);box-shadow:var(--shadow-sm);">
      <button id="login-tab" class="tab-toggle active" onclick="showTab('login')">Sign In</button>
      <button id="register-tab" class="tab-toggle" onclick="showTab('register')">Create Account</button>
    </div>

    <!-- Login Form -->
    <div id="login-form" class="auth-card">
      <div style="text-align:center;margin-bottom:var(--space-7);">
        <div style="font-size:36px;margin-bottom:var(--space-3);">👋</div>
        <h1 style="font-family:var(--font-display);font-size:var(--text-2xl);margin-bottom:var(--space-2);">Welcome Back</h1>
        <p style="color:var(--brand-muted);font-size:var(--text-sm);">Sign in to your ShopWave account</p>
      </div>

      <form id="login-fields" onsubmit="handleLogin(event)" novalidate>
        <div style="display:flex;flex-direction:column;gap:var(--space-4);">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" style="display:flex;justify-content:space-between;">
              Password
              <a href="/pages/forgot-password.html" style="font-weight:400;color:var(--brand-primary);font-size:var(--text-xs);">Forgot password?</a>
            </label>
            <div style="position:relative;">
              <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password" style="padding-right:48px;">
              <button type="button" onclick="togglePassword('login-password','eye-1')"
                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--brand-muted);" id="eye-1">👁</button>
            </div>
          </div>
          <div id="login-error" style="display:none;background:#FEF2F2;border:1px solid #FCA5A5;border-radius:var(--radius-md);padding:10px 14px;font-size:var(--text-sm);color:var(--color-danger);"></div>
          <button type="submit" class="btn btn--primary btn--full btn--lg" id="login-btn">Sign In</button>
        </div>
      </form>

      <div style="margin:var(--space-6) 0;display:flex;align-items:center;gap:var(--space-4);">
        <div style="flex:1;height:1px;background:var(--brand-border);"></div>
        <span style="font-size:var(--text-xs);color:var(--brand-muted);">or continue with</span>
        <div style="flex:1;height:1px;background:var(--brand-border);"></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);">
        <button class="btn btn--outline-dark" onclick="googleLogin()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="btn btn--outline-dark" onclick="Toast.info('Coming soon','Facebook login is coming soon')">
          <span style="color:#1877F2;font-weight:700;">f</span> Facebook
        </button>
      </div>

      <p style="text-align:center;margin-top:var(--space-6);font-size:var(--text-sm);color:var(--brand-muted);">
        Don't have an account? <a href="#" onclick="showTab('register')" style="color:var(--brand-primary);font-weight:600;">Create one</a>
      </p>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="auth-card" style="display:none;">
      <div style="text-align:center;margin-bottom:var(--space-7);">
        <div style="font-size:36px;margin-bottom:var(--space-3);">🚀</div>
        <h1 style="font-family:var(--font-display);font-size:var(--text-2xl);margin-bottom:var(--space-2);">Join ShopWave</h1>
        <p style="color:var(--brand-muted);font-size:var(--text-sm);">Create your free account and start shopping</p>
      </div>

      <form onsubmit="handleRegister(event)" novalidate>
        <div style="display:flex;flex-direction:column;gap:var(--space-4);">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input type="text" id="reg-fname" class="form-control" placeholder="Adaeze" required autocomplete="given-name">
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input type="text" id="reg-lname" class="form-control" placeholder="Okonkwo" required autocomplete="family-name">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" id="reg-phone" class="form-control" placeholder="+234 801 234 5678" autocomplete="tel">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div style="position:relative;">
              <input type="password" id="reg-password" class="form-control" placeholder="Minimum 8 characters" required autocomplete="new-password" style="padding-right:48px;" oninput="checkPasswordStrength(this.value)">
              <button type="button" onclick="togglePassword('reg-password','eye-2')"
                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--brand-muted);" id="eye-2">👁</button>
            </div>
            <!-- Password strength bar -->
            <div style="height:4px;border-radius:2px;background:var(--brand-border);margin-top:8px;overflow:hidden;">
              <div id="strength-bar" style="height:100%;width:0%;border-radius:2px;transition:all 0.3s;"></div>
            </div>
            <div id="strength-label" style="font-size:10px;color:var(--brand-muted);margin-top:4px;"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="reg-confirm" class="form-control" placeholder="Repeat password" required autocomplete="new-password">
          </div>
          <div id="reg-error" style="display:none;background:#FEF2F2;border:1px solid #FCA5A5;border-radius:var(--radius-md);padding:10px 14px;font-size:var(--text-sm);color:var(--color-danger);"></div>
          <label style="display:flex;gap:var(--space-3);align-items:flex-start;font-size:var(--text-xs);color:var(--brand-mid);cursor:pointer;">
            <input type="checkbox" id="reg-terms" required style="margin-top:2px;accent-color:var(--brand-primary);">
            I agree to ShopWave's <a href="/pages/terms.html" style="color:var(--brand-primary);">Terms of Service</a> and
            <a href="/pages/privacy.html" style="color:var(--brand-primary);">Privacy Policy</a>
          </label>
          <button type="submit" class="btn btn--primary btn--full btn--lg" id="register-btn">Create Account</button>
        </div>
      </form>

      <p style="text-align:center;margin-top:var(--space-6);font-size:var(--text-sm);color:var(--brand-muted);">
        Already have an account? <a href="#" onclick="showTab('login')" style="color:var(--brand-primary);font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>
</div>

<style>
.auth-card {
  background: var(--brand-white);
  border-radius: var(--radius-2xl);
  box-shadow: var(--shadow-xl);
  padding: var(--space-8);
}
.tab-toggle {
  flex: 1; padding: 0.6rem; border-radius: var(--radius-full);
  font-size: var(--text-sm); font-weight: 600;
  color: var(--brand-muted); transition: all var(--transition-fast);
  cursor: pointer; background: none; border: none;
}
.tab-toggle.active { background: var(--brand-primary); color: white; }
</style>

<script src="/js/core.js"></script>
<script>
// Redirect if already logged in
if (Auth.isLoggedIn()) {
  const redirect = Utils.param('redirect') || '/';
  window.location.href = redirect;
}

// Check URL for tab
const tab = Utils.param('tab') || 'login';
if (tab === 'register') showTab('register');

function showTab(t) {
  document.getElementById('login-form').style.display = t === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = t === 'register' ? 'block' : 'none';
  document.getElementById('login-tab').classList.toggle('active', t === 'login');
  document.getElementById('register-tab').classList.toggle('active', t === 'register');
  document.title = t === 'register' ? 'Create Account — ShopWave' : 'Sign In — ShopWave';
  history.replaceState(null, '', `?tab=${t}`);
}

function togglePassword(inputId, btnId) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
  document.getElementById(btnId).textContent = input.type === 'password' ? '👁' : '🙈';
}

function checkPasswordStrength(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const bar = document.getElementById('strength-bar');
  const label = document.getElementById('strength-label');
  const colors = ['var(--color-danger)', 'var(--color-warning)', 'var(--brand-secondary)', 'var(--color-success)'];
  const labels = ['Weak', 'Fair', 'Good', 'Strong'];
  bar.style.width = `${score * 25}%`;
  bar.style.background = colors[score - 1] || 'transparent';
  label.textContent = score > 0 ? labels[score - 1] : '';
  label.style.color = colors[score - 1] || 'inherit';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = 'Signing in…';

  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) {
    showError(errEl, 'Please enter your email and password.');
    resetBtn(btn, 'Sign In');
    return;
  }

  try {
    await Auth.login(email, password);
    const redirect = Utils.param('redirect') || '/';
    window.location.href = redirect;
  } catch (err) {
    showError(errEl, err.message || 'Invalid email or password. Please try again.');
    resetBtn(btn, 'Sign In');
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('register-btn');
  const errEl = document.getElementById('reg-error');
  errEl.style.display = 'none';

  const fname = document.getElementById('reg-fname').value.trim();
  const lname = document.getElementById('reg-lname').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const terms = document.getElementById('reg-terms').checked;

  if (!fname || !email || !password) { showError(errEl, 'Please fill in all required fields.'); return; }
  if (password !== confirm) { showError(errEl, 'Passwords do not match.'); return; }
  if (password.length < 8) { showError(errEl, 'Password must be at least 8 characters.'); return; }
  if (!terms) { showError(errEl, 'Please accept the Terms of Service to continue.'); return; }

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = 'Creating account…';

  try {
    await Auth.register({ full_name: `${fname} ${lname}`.trim(), email, phone, password });
    const redirect = Utils.param('redirect') || '/';
    Toast.success('Account created!', `Welcome to ShopWave, ${fname}!`);
    setTimeout(() => window.location.href = redirect, 1000);
  } catch (err) {
    showError(errEl, err.message || 'Registration failed. Please try again.');
    resetBtn(btn, 'Create Account');
  }
}

function showError(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}

function resetBtn(btn, label) {
  btn.disabled = false;
  btn.classList.remove('loading');
  btn.textContent = label;
}

async function googleLogin() {
  try {
    await API.post('/users/oauth/google', {});
  } catch {
    Toast.info('Coming soon', 'Google login will be available shortly.');
  }
}
</script>
</body>
</html>
