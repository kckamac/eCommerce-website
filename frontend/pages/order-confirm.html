<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — ShopWave</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar__inner">
      <a href="/" class="navbar__logo">
        <div class="navbar__logo-icon">🌊</div>
        <span class="navbar__logo-text">Shop<span>Wave</span></span>
      </a>
    </div>
  </div>
</nav>

<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:var(--space-8);">
  <div id="confirm-content" style="max-width:640px;width:100%;text-align:center;">
    <!-- Loading -->
    <div class="skeleton" style="height:200px;border-radius:var(--radius-2xl);margin-bottom:20px;"></div>
    <div class="skeleton" style="height:20px;width:60%;margin:0 auto 12px;border-radius:8px;"></div>
    <div class="skeleton" style="height:16px;width:80%;margin:0 auto;border-radius:8px;"></div>
  </div>
</div>

<script src="/js/core.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const orderNum = Utils.param('order');
  if (!orderNum) { window.location.href = '/'; return; }

  try {
    const data = await API.get(`/orders/${orderNum}`);
    const order = data.order;
    renderConfirmation(order);
  } catch {
    // Show basic confirmation even if API fails
    renderBasicConfirmation(orderNum);
  }
});

function renderConfirmation(order) {
  const isDigital = order.items?.every(i => i.product_type === 'digital');
  document.getElementById('confirm-content').innerHTML = `
    <div style="background:var(--brand-white);border-radius:var(--radius-2xl);box-shadow:var(--shadow-xl);padding:var(--space-10);text-align:center;">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,var(--color-success),#16A34A);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto var(--space-6);">✓</div>
      <h1 style="font-family:var(--font-display);font-size:var(--text-3xl);margin-bottom:var(--space-3);">Order Confirmed! 🎉</h1>
      <p style="color:var(--brand-mid);font-size:var(--text-md);margin-bottom:var(--space-6);">
        Thank you for your purchase. We've sent a confirmation to <strong>${Utils.sanitize(order.email || '')}</strong>.
      </p>

      <div style="background:var(--brand-light);border-radius:var(--radius-xl);padding:var(--space-5);margin-bottom:var(--space-6);text-align:left;">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
          <span style="font-size:var(--text-sm);color:var(--brand-muted);">Order Number</span>
          <span style="font-family:var(--font-mono);font-weight:700;color:var(--brand-primary);">#${Utils.sanitize(order.order_number)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
          <span style="font-size:var(--text-sm);color:var(--brand-muted);">Total Paid</span>
          <span style="font-weight:700;">${Utils.formatCurrency(order.total)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
          <span style="font-size:var(--text-sm);color:var(--brand-muted);">Payment Method</span>
          <span style="font-weight:600;text-transform:capitalize;">${Utils.sanitize(order.payment_method || '')}</span>
        </div>
        <div style="display:flex;justify-content:space-between;">
          <span style="font-size:var(--text-sm);color:var(--brand-muted);">Estimated Delivery</span>
          <span style="font-weight:600;color:var(--brand-secondary);">${isDigital ? 'Instant Download' : '3–5 Business Days'}</span>
        </div>
      </div>

      ${order.items?.length ? `
      <div style="text-align:left;margin-bottom:var(--space-6);">
        <div style="font-weight:700;margin-bottom:var(--space-3);">Items Ordered</div>
        ${order.items.map(item => `
          <div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;border-bottom:1px solid var(--brand-border-light);">
            <img src="${item.product_image || '/assets/placeholder.svg'}" style="width:48px;height:48px;border-radius:var(--radius-md);object-fit:cover;" onerror="this.src='/assets/placeholder.svg'">
            <div style="flex:1;">
              <div style="font-weight:600;font-size:var(--text-sm);">${Utils.sanitize(item.product_name)}</div>
              <div style="font-size:var(--text-xs);color:var(--brand-muted);">Qty: ${item.quantity}</div>
              ${item.product_type === 'digital' && item.download_url
                ? `<a href="${Utils.sanitize(item.download_url)}" class="btn btn--secondary btn--sm" style="margin-top:6px;" download>📥 Download</a>` : ''}
            </div>
            <div style="font-weight:700;">${Utils.formatCurrency(item.total_price)}</div>
          </div>`).join('')}
      </div>` : ''}

      <div style="display:flex;flex-direction:column;gap:var(--space-3);">
        <a href="/pages/orders.html" class="btn btn--primary btn--full">Track My Order</a>
        <a href="/pages/shop.html" class="btn btn--outline btn--full">Continue Shopping</a>
      </div>

      <div style="margin-top:var(--space-6);display:flex;justify-content:center;gap:var(--space-6);font-size:var(--text-xs);color:var(--brand-muted);">
        <span>🔒 Secure payment</span>
        <span>📧 Confirmation sent</span>
        <span>💬 24/7 support</span>
      </div>
    </div>`;
}

function renderBasicConfirmation(orderNum) {
  document.getElementById('confirm-content').innerHTML = `
    <div style="background:var(--brand-white);border-radius:var(--radius-2xl);box-shadow:var(--shadow-xl);padding:var(--space-10);text-align:center;">
      <div style="font-size:72px;margin-bottom:var(--space-5);">🎉</div>
      <h1 style="font-family:var(--font-display);font-size:var(--text-3xl);margin-bottom:var(--space-3);">Order Confirmed!</h1>
      <p style="color:var(--brand-mid);margin-bottom:var(--space-4);">Your order <strong>#${Utils.sanitize(orderNum)}</strong> has been placed successfully.</p>
      <p style="color:var(--brand-muted);font-size:var(--text-sm);margin-bottom:var(--space-8);">A confirmation email has been sent to you.</p>
      <div style="display:flex;flex-direction:column;gap:var(--space-3);">
        <a href="/pages/orders.html" class="btn btn--primary">View My Orders</a>
        <a href="/pages/shop.html" class="btn btn--outline">Continue Shopping</a>
      </div>
    </div>`;
}
</script>
</body>
</html>
